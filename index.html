<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Task Manager Demo</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Task Manager</h1>
    <div class="add-task">
      <input id="taskInput" type="text" placeholder="Add a new task..." />
      <button id="addBtn">Add</button>
    </div>
    <input id="searchInput" type="text" placeholder="Search tasks..." class="search-box" />
    <ul id="taskList"></ul>
  </div>
  <script src="app.js"></script>
</body>
</html>
