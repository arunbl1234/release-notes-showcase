name: Auto Release on Merge to Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next_version
        run: |
          latest="${{ steps.get_tag.outputs.latest }}"
          version="${latest#v}"
          IFS='.' read -r major minor patch <<< "$version"
          patch=$((patch + 1))
          next="v${major}.${minor}.${patch}"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Generate categorized release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          latest="${{ steps.get_tag.outputs.latest }}"
          next="${{ steps.next_version.outputs.next }}"
          if [ "$latest" = "v0.0.0" ]; then
            gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$next" --jq '.body' > release_notes.md
          else
            gh api "repos/${{ github.repository }}/releases/generate-notes" \
              -f tag_name="$next" -f previous_tag_name="$latest" --jq '.body' > release_notes.md
          fi

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.next_version.outputs.next }}" \
            --title "${{ steps.next_version.outputs.next }}" \
            --notes-file release_notes.md \
            --latest
