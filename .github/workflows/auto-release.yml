name: Auto Release on Merge to Main

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get latest tag
        id: get_tag
        run: |
          latest=$(git tag --list 'v*' --sort=-v:refname | head -n 1)
          if [ -z "$latest" ]; then
            latest="v0.0.0"
          fi
          echo "latest=$latest" >> "$GITHUB_OUTPUT"

      - name: Compute next version
        id: next_version
        run: |
          latest="${{ steps.get_tag.outputs.latest }}"
          version="${latest#v}"
          IFS='.' read -r major minor patch <<< "$version"
          patch=$((patch + 1))
          next="v${major}.${minor}.${patch}"
          echo "next=$next" >> "$GITHUB_OUTPUT"

      - name: Generate AI-analyzed release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          REPO: ${{ github.repository }}
          LATEST_TAG: ${{ steps.get_tag.outputs.latest }}
        run: node .github/scripts/generate-release-notes.js

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.next_version.outputs.next }}" \
            --title "${{ steps.next_version.outputs.next }}" \
            --notes-file release_notes.md \
            --latest
